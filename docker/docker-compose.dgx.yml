  echomimic:
    build:
      context: ./echomimic
      dockerfile: Dockerfile.arm64
    container_name: secretary-echomimic
    profiles: [avatar-experimental]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
