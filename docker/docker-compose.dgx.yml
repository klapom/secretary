    shm_size: "8gb"
    volumes:
      - echomimic-models:/app/models
      - echomimic-cache:/root/.cache
    ports:
      - "8086:8086"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
