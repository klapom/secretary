  # EchoMimic V3 — Lip-sync video generation (portrait + audio → MP4)
  # Profile: avatar-experimental (ARM64 compatibility unconfirmed — test first)
  # Input:  POST /api/render  source_image + audio → MP4
  # Output: 768x768 @25fps, flash-pro variant (8 steps, ~15-25s per clip)
  echomimic:
    build:
      context: ./echomimic
      dockerfile: Dockerfile.arm64
    container_name: secretary-echomimic
    profiles: [avatar-experimental]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
