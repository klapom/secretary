# Docker Compose for DGX Spark - Avatar System
# Hardware: NVIDIA GB10 (Blackwell sm_121), 128GB Unified Memory, CUDA 13.0
# Usage:
#   STT only + LLM (empfohlen):  docker compose --profile stt --profile llm up -d
#   Full Avatar + LLM:           docker compose --profile avatar --profile llm up -d
#   Nur LLM:                     docker compose --profile llm up -d
#
# Profile-Übersicht:
#   stt    — Nur Whisper STT (Spracheingabe, ~3GB VRAM)
#   avatar — Whisper + XTTS TTS + LivePortrait (~11GB VRAM)
#   llm    — vLLM Nemotron/Qwen
#   avatar-experimental — EchoMimic, Canary-NeMo

services:
  # LivePortrait - Avatar rendering (primary GPU consumer)
  liveportrait:
    build:
      context: ./liveportrait
      dockerfile: Dockerfile.arm64
    container_name: secretary-liveportrait
    profiles: [avatar] # Only start when avatar is active
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0 # Use first GPU
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 16G
        limits:
          memory: 20G
    shm_size: "4gb" # Shared memory for PyTorch
    volumes:
      - liveportrait-models:/app/models
      - liveportrait-cache:/root/.cache
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - avatar-network

  # XTTS v2 (Coqui TTS) - Voice synthesis (PRIMARY TTS)
  # Supports: 17 languages incl. DE + EN, voice cloning
  xtts:
    build:
      context: ./xtts
      dockerfile: Dockerfile
    container_name: secretary-xtts
    profiles: [avatar]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
      - COQUI_TOS_AGREED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 8G
        limits:
          memory: 12G
    shm_size: "2gb"
    volumes:
      - xtts-models:/root/.local/share/tts
      - xtts-cache:/root/.cache
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - avatar-network

  # Parler-TTS Mini Multilingual v2 - Voice synthesis (EXPERIMENTAL - attempt 2)
  # Strategy: --no-deps install to bypass torch version conflict
  # Supports: EN, DE, FR, ES, PT, PL, IT, NL
  parler-tts-v2:
    build:
      context: ./parler-tts-v2
      dockerfile: Dockerfile
    container_name: secretary-parler-tts-v2
    profiles: [avatar-experimental]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 6G
        limits:
          memory: 8G
    shm_size: "2gb"
    volumes:
      - parler-v2-models:/app/models
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - avatar-network

  # Distil-Whisper Large V3 - Speech-to-text (Option 1 - WORKING)
  # Supports: 97 languages, 6x faster than Whisper
  distil-whisper:
    build:
      context: ./distil-whisper
      dockerfile: Dockerfile
    container_name: secretary-distil-whisper
    profiles: [avatar, stt] # 'stt' starts only Whisper without full avatar stack
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 4G
        limits:
          memory: 6G
    shm_size: "2gb"
    volumes:
      - distil-whisper-models:/app/models
      - distil-whisper-cache:/root/.cache
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
    networks:
      - avatar-network

  # NVIDIA Canary-1b-v2 with NeMo - Speech-to-text (Option 2 - EXPERIMENTAL)
  # Supports: 25 languages including DE, EN + translation
  canary-nemo:
    build:
      context: ./canary-nemo
      dockerfile: Dockerfile
    container_name: secretary-canary-nemo
    profiles: [avatar-experimental] # Experimental profile
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
          memory: 6G
        limits:
          memory: 10G
    shm_size: "2gb"
    volumes:
      - canary-nemo-models:/app/models
      - canary-nemo-cache:/root/.cache
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s # NeMo + Canary loading takes longer
    restart: unless-stopped
    networks:
      - avatar-network

